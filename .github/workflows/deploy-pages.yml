name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'data/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_run:
    workflows: ['Daily Scan']
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Sync picks data into web/public/data
        # data/ (root) is the source of truth the scanner writes to; the built
        # site serves whatever is under web/public/data at build time, so keep
        # it in lockstep rather than relying on a second commit staying fresh.
        run: |
          rm -rf web/public/data
          cp -r data web/public/data

      - name: Build
        working-directory: web
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
