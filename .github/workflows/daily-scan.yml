name: Daily Scan

on:
  schedule:
    # 21:30 UTC, Mon-Fri. Cron is UTC and does not shift for DST, so this
    # lands 4:30pm ET (EDT) or 5:30pm ET (EST) - a safe margin after the
    # 4pm ET market close either way. Does not account for market holidays;
    # a holiday run just re-scans a closed/unchanged day.
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scanner dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run daily scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scanner.main

      - name: Commit and push picks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Daily scan: $(date -u +%F)"
          git push
