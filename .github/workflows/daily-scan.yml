name: Daily Scan

on:
  schedule:
    # 14:35 UTC, Mon-Fri. Cron is UTC and does not shift for DST, so this
    # lands 9:35am ET (EST) or 10:35am ET (EDT) - always after the 9:30am ET
    # market open, with a tight 5min margin in winter and a wider one in
    # summer (prioritizing "never before open" over a tight margin
    # year-round). Does not account for market holidays; a holiday run just
    # re-scans a closed/unchanged day.
    - cron: '35 14 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scanner dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run daily scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scanner.main

      - name: Commit and push picks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Daily scan: $(date -u +%F)"
          git push
